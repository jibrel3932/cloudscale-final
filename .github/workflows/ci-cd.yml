name: CloudScale CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  ACR_NAME: jibrelacr3932b
  ACR_LOGIN_SERVER: jibrelacr3932b.azurecr.io
  IMAGE_NAME: cloudscale-app
  RESOURCE_GROUP: JibrelAbubakrJibrel-Final-rg
  AKS_CLUSTER: JibrelAbubakrJibrel-Final-aks

jobs:
  # 1. Build and test on EVERY push
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Run tests
        working-directory: ./app
        run: node test.js

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

  # 2. Push image to ACR - only on push to main
  push-to-acr:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        run: az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Build and push image to ACR
        run: |
          az acr login --name $ACR_NAME
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

  # 3. Deploy to AKS - protected by a manual approval gate (environment: production)
  deploy-to-aks:
    needs: push-to-acr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production   # <-- Manual approval gate configured in repo Settings > Environments
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        run: az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}
      - name: Deploy to Azure Container Instances
        run: |
          az container create \
            --resource-group $RESOURCE_GROUP \
            --name cloudscale-aci \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:latest \
            --registry-login-server $ACR_LOGIN_SERVER \
            --registry-username ${{ secrets.AZURE_CLIENT_ID }} \
            --registry-password ${{ secrets.AZURE_CLIENT_SECRET }} \
            --os-type Linux --cpu 1 --memory 1 \
            --ports 80 --ip-address Public \
            --location swedencentral \
            --dns-name-label cloudscale-jibrel-3932 || true
      - name: Show deployment URL
        run: az container show --resource-group $RESOURCE_GROUP --name cloudscale-aci --query "ipAddress.fqdn" -o tsv